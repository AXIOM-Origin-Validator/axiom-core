# ============================================================================
# AXIOM Genesis Ceremony Configuration
# ============================================================================
#
# Paths are relative to where the ceremony tool runs from (src/ workspace root).
# install_genesis.sh handles running from the correct directory.
#
# wallet_email: Genesis wallet address uses this email.
#   Format: "validator_alpha@axiom" → wallet_id = "validator_alpha@axiom/hex8"
#   These are not real email addresses. Operators change delivery email
#   after going online (DEED TX → -01 suffix → provide receiver_address).

[ceremony]
vbc_version = 9
output_dir = "genesis-output"
root_keys_dir = "root-keys"
expires_years = 10
# Path to Core's genesis.rs for auto-install of constants
# Relative to where the ceremony runs (src/ workspace root)
core_genesis_path = "core/logic/src/genesis.rs"

[certificate_authority]
name = "AXIOM Origin"
pgp_fingerprint = "4A189E40F20F5A34B7D69F19D596AB0993DFF9D2"

[[validators]]
name = "axiom-first-penguin-alpha"
path = "genesis-validators/axiom-first-penguin-alpha"
wallet_email = "validator_alpha@axiom"
pgp_fingerprint = "4A189E40F20F5A34B7D69F19D596AB0993DFF9D2"
notes = "Genesis Validator - Alpha"

